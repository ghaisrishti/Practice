on: push
jobs:
  upload-file:
    runs-on: ubuntu-latest
    steps:
      - name: Create file
        run: echo "Hello World" > file.txt

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  download-file:
    runs-on: ubuntu-latest
    needs: upload-file
    steps:
      - name: Download file
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Read file
        run: cat file.txt